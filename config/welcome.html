<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Welcome to Galaxy Enterprise</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; color: #333; margin: 0; padding: 2em; display: flex; justify-content: center; align-items: center; min-height: 100vh; text-align: center; }
        .container { background: white; padding: 3em; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 600px; }
        h1 { color: #2c3e50; font-size: 2.5em; margin-bottom: 0.5em; }
        p { line-height: 1.6; color: #7f8c8d; font-size: 1.1em; }
        .btn { display: inline-block; background: #3498db; color: white; padding: 0.75em 1.5em; text-decoration: none; border-radius: 5px; margin-top: 1.5em; font-weight: bold; transition: background 0.3s ease; }
        .btn:hover { background: #2980b9; }
        footer { margin-top: 2em; font-size: 0.9em; color: #bdc3c7; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to Galaxy Enterprise</h1>
        <p>Your secure environment for data analysis and scientific workflows. Please log in with your corporate credentials to begin your analysis.</p>
        <a href="/" class="btn">Get Started</a>
        <footer>Managed by IT Department</footer>
    </div>
</body>
</html>
